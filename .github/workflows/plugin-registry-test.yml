name: Plugin Registry Tests

on:
  push:
    paths:
      - "packages/plugin-registry/**"
      - ".github/workflows/plugin-registry-test.yml"
      - "CONTRIBUTING.md"
  pull_request:
    paths:
      - "packages/plugin-registry/**"
      - ".github/workflows/plugin-registry-test.yml"
      - "CONTRIBUTING.md"

jobs:
  test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run plugin registry tests
        run: npm run test -w @tailwind-styled/plugin-registry
