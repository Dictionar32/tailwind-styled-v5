name: Rust Parser Regression

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run build -w @tailwind-styled/compiler -w @tailwind-styled/scanner
      - run: node scripts/regression/rust-parser.js
        env:
          TWS_DEBUG_SCANNER: '1'

      - uses: actions/upload-artifact@v4
        with:
          name: rust-parser-regression-${{ matrix.os }}-node${{ matrix.node }}
          path: artifacts/regression/*.json
